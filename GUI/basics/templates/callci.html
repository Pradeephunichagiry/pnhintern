{% extends 'index.html' %}
{% block content %}
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>calculator page</title>
</head>
<body>
    <form method="POST">
        {% csrf_token %}
        <center>
        <h1>calculator</h1>
        <input type="number"name="num1"value="{{num1}}"placeholder="number 1"><br><br>
        <input type="number"name="num2"value="{{num2}}"placeholder="number 2"><br><br>
        <button style="color:blueviolet;"type="submit"name="op"value="add">+</button>
        <button style="color:brown;"type="submit"name="op"value="sub">-</button>
        <button style="color:chocolate;"type="submit"name="op"value="mul">×</button>
        <button style="color:coral;"type="submit"name="op"value="div">÷</button>
        <button style="color:darkcyan;" type="submit" name="op" value="avg">Avg</button>
        <button style="color:darkgoldenrod;" type="submit" name="op" value="perc">%</button><br><br>
        <p>result:</p>
        <input type="text"name="result"value="{{result}}"readonly>
    </form>
    </center>
</body>
{% endblock %}
